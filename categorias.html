<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light only">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Explora todas las categorías de YVENNE: hogar, cocina, decoración, niños, mascotas y más.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/estilos.css">
<title>YVENNE — Categorías</title>
<style>
  .page-head{ padding:16px 48px 32px; }
  .page-head h1{ font-size:44px; margin-bottom:10px; }
  .page-head p{ max-width:460px; color:var(--muted); font-size:15px; line-height:1.5; font-family:-apple-system,sans-serif; }

  .cat-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:20px; padding:0 48px 70px; }
  .cat-card{
    position:relative; border:1px solid var(--line); border-radius:16px; overflow:hidden;
    text-decoration:none; color:var(--ink); display:block;
    opacity:0; transform:scale(0.9); filter:blur(4px);
    transition: opacity 0.6s ease, transform 0.6s ease, filter 0.6s ease;
  }
  .cat-card.in-view{ opacity:1; transform:scale(1); filter:blur(0); }
  .cat-thumb{ aspect-ratio:16/9; }
  .cat-info{ padding:16px 18px 20px; font-family:-apple-system,sans-serif; }
  .cat-info .name{ font-family:'Georgia',serif; font-size:20px; margin-bottom:6px; }
  .cat-info .desc{ font-size:13px; color:var(--muted); line-height:1.5; margin-bottom:8px; }
  .cat-info .count{ font-size:12px; font-weight:700; }

  @media (max-width:1000px){ .cat-grid{ grid-template-columns:repeat(2,1fr); } }
  @media (max-width:620px){
    .page-head{ padding:14px 16px 20px; }
    .page-head h1{ font-size:30px; }
    .cat-grid{ grid-template-columns:1fr; gap:12px; padding:0 16px 40px; }
  }
</style>
</head>
<body>

<div id="siteHeader"></div>

<div class="breadcrumb"><a href="index.html">Inicio</a> &nbsp;›&nbsp; <span>Categorías</span></div>

<div class="page-head">
  <h1>Todas las categorías</h1>
  <p>Explora nuestro catálogo por categoría y encuentra exactamente lo que buscas.</p>
</div>

<div class="cat-grid" id="catGrid"></div>

<div id="siteFooter"></div>

<script src="js/datos.js"></script>
<script src="js/nube.js"></script>
<script src="js/tienda.js"></script>
<script>
function __iniciarPagina(){
  renderHeader("categorias");
  document.getElementById("catGrid").innerHTML = CATEGORIAS.map(c => {
    const n = CATALOGO.filter(p => p.categoria === c.id).length;
    return `
    <a class="cat-card" href="categoria.html?cat=${c.id}">
      <div class="cat-thumb" style="background:${c.grad};"></div>
      <div class="cat-info">
        <div class="name">${c.nombre}</div>
        <div class="desc">${c.desc}</div>
        <div class="count">${n} producto${n === 1 ? "" : "s"} ›</div>
      </div>
    </a>`;
  }).join("");
  activarReveal();

}
arrancarTienda(__iniciarPagina);
</script>

</body>
</html>
